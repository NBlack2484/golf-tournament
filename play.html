<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Player Hole Score</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background-image: url('assets/images/st_andrews.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: Arial, sans-serif;
  }

  .overlay {
    background-color: rgba(0,0,0,0.3);
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center; /* vertical center */
    align-items: center;     /* horizontal center */
    text-align: center;
    padding: 2rem;
    box-sizing: border-box;
  }

  h1, label {
    color: white;
    margin: 0.5rem 0;
  }

  input[type="text"], input[type="number"] {
    padding: 0.5rem;
    margin: 0.5rem 0;
    border-radius: 4px;
    border: none;
    width: 200px;
    max-width: 90%;
  }

  .btn {
    display: inline-block;
    padding: 12px 24px;
    margin-top: 1rem;
    background-color: #e63946;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-size: 1.1rem;
    cursor: pointer;
  }

  .btn:hover {
    background-color: #d62828;
  }
</style>
</head>
<body>
  <div class="overlay">
    <h1>Enter Player Hole Score</h1>
    <form action="leaderboard.html" method="get">
      <label for="playerName">Player Name:</label><br>
      <input type="text" id="playerName" name="playerName" required><br>
      <label for="holeScore">Hole Score:</label><br>
      <input type="number" id="holeScore" name="holeScore" min="1" required><br>
      <button type="submit" class="btn">Submit Score</button>
    </form>
  </div>
</body>
</html>
