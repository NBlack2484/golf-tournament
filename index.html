<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STL Naturals Tournament</title>
  <style>
    /* Full-page background */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      background: url('assets/images/augusta.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* Top banner stretched full width with fixed height */
    .top-banner {
      width: 100%;
      height: 200px; /* Fixed height for the banner */
      object-fit: cover;
      display: block;
      margin-top: 20px;
    }

    /* Enter Tournament button */
    .enter-button {
      margin-top: 50px;  /* Adjust the space between the banner and button */
      padding: 20px 40px;
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      background-color: rgba(0, 123, 255, 0.85);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      text-decoration: none;
    }

    .enter-button:hover {
      background-color: rgba(0, 123, 255, 1);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .enter-button {
        font-size: 1.5rem;
        padding: 15px 30px;
      }
      .top-banner {
        height: 150px; /* Slightly smaller on mobile */
      }
    }
  </style>
</head>
<body>

  <!-- Top Banner Overlay -->
  <img src="assets/images/stl_naturals_banner.png" alt="STL Naturals Tournament Banner" class="top-banner">

  <!-- Enter Tournament Button -->
  <a href="registration.html" class="enter-button">Enter Tournament</a>

</body>
</html>
