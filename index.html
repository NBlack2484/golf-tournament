<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Tournament Registration</title>
<link rel="stylesheet" href="css/style.css">
<style>
  /* Full-page background */
  body {
    margin: 0;
    min-height: 100vh;
    background: url('assets/images/augusta.png') no-repeat center center fixed;
    background-size: cover;
    font-family: Arial, sans-serif;
  }

  /* Overlay for text readability */
  .overlay {
    width: 100%;
    min-height: 100vh;
    background-color: rgba(0,0,0,0.25); /* semi-transparent */
    padding: 2rem;
    box-sizing: border-box;
  }

  /* Banner */
  .banner {
    display: block;
    margin: 0 auto;
    width: 80%;          /* responsive width */
    max-width: 1200px;
    height: auto;
    max-height: 150px;   /* limit height */
    object-fit: contain;
  }

  /* Heading and paragraph */
  h1, p {
    text-align: center;
    color: white;
    margin: 1rem 0;
  }

  /* Enter Tournament button */
  .btn {
    display: block;
    margin: 2rem auto;
    padding: 12px 24px;
    width: 220px;
    text-align: center;
    background-color: #e63946;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-size: 1.2rem;
  }

  .btn:hover {
    background-color: #d62828;
  }
</style>
</head>
<body>
  <div class="overlay">
    <img src="assets/images/stl_naturals_banner.png" alt="St. Louis Naturals Banner" class="banner">
    <h1>St. Louis Naturals Golf Tournament</h1>
    <p>Join us for a fun golf tournament!</p>
    <a href="play.html" class="btn">Enter Tournament</a>
  </div>
</body>
</html>
