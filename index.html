<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Tournament Registration</title>
<link rel="stylesheet" href="css/style.css">
<style>
  /* Full-screen background */
  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background-image: url('assets/images/augusta.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: Arial, sans-serif;
  }

  /* Overlay to make content readable and centered */
  .overlay {
    background-color: rgba(0,0,0,0.3); /* semi-transparent overlay */
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;  /* start near top */
    align-items: center;          /* horizontal center */
    text-align: center;
    padding: 2rem;
    box-sizing: border-box;
  }

  /* Banner image at top of page */
  .banner {
    width: 70%;          /* responsive width */
    max-width: 1000px;   /* limit max width */
    height: auto;        /* keep aspect ratio */
    margin-bottom: 2rem;
  }

  /* Enter Tournament button */
  .btn {
    display: inline-block;
    padding: 12px 24px;
    margin-top: 2rem;
    background-color: #e63946;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-size: 1.2rem;
  }

  .btn:hover {
    background-color: #d62828;
  }

  h1, p {
    color: white; /* text readable on top of background */
    margin: 0.5rem 0;
  }
</style>
</head>
<body>
  <div class="overlay">
    <!-- Top banner -->
    <img src="assets/images/stl_naturals_banner.png" alt="St. Louis Naturals Banner" class="banner">

    <!-- Heading and info -->
    <h1>St. Louis Naturals Golf Tournament</h1>
    <p>Join us for a fun golf tournament!</p>

    <!-- Enter Tournament button -->
    <a href="play.html" class="btn">Enter Tournament</a>
  </div>
</body>
</html>
