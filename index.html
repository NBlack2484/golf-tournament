<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Tournament Registration</title>
<link rel="stylesheet" href="css/style.css">
<style>
  /* Full-page Augusta background */
  body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background-image: url('assets/images/augusta.png');
    background-size: cover;        /* fill screen */
    background-position: center;
    background-repeat: no-repeat;
    font-family: Arial, sans-serif;
  }

  /* Overlay for readability, content flows from top */
  .overlay {
    background-color: rgba(0, 0, 0, 0.2); /* subtle overlay */
    width: 100%;
    min-height: 100vh;
    padding: 2rem;
    box-sizing: border-box;
  }

  /* Banner at top of page */
  .banner {
    width: 90%;          /* span across most of the screen */
    max-width: 1200px;   /* maximum width */
    height: auto;
    max-height: 200px;   /* prevent huge banner */
    display: block;
    margin: 0 auto 2rem auto; /* top centered */
  }

  /* Heading and description */
  h1, p {
    color: white;
    text-align: center;
    margin: 0.5rem 0;
  }

  /* Enter Tournament button */
  .btn {
    display: block;
    margin: 2rem auto;
    padding: 12px 24px;
    background-color: #e63946;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-size: 1.2rem;
    width: 200px;
    text-align: center;
  }

  .btn:hover {
    background-color: #d62828;
  }
</style>
</head>
<body>
  <div class="overlay">
    <!-- Top banner -->
    <img src="assets/images/stl_naturals_banner.png" alt="St. Louis Naturals Banner" class="banner">

    <!-- Page heading -->
    <h1>St. Louis Naturals Golf Tournament</h1>
    <p>Join us for a fun golf tournament!</p>

    <!-- Enter Tournament button -->
    <a href="play.html" class="btn">Enter Tournament</a>
  </div>
</body>
</html>
