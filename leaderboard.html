<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Leaderboard · STL Naturals Golf Classic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:       #c9a227;
      --gold-light: #f0d060;
      --gold-dim:   rgba(201,162,39,0.55);
      --cream:      #f4eed8;
      --eagle:      #a78bfa;
      --birdie:     #60a5fa;
      --bogey:      #facc15;
      --double:     #fb923c;
      --worse:      #f87171;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background:#000;
    }

    /* Background */
    .bg {
      position:fixed; inset:0;
      background: url('assets/images/st_andrews.jpg') no-repeat center center;
      background-size:cover;
      z-index:0;
    }
    .bg::after {
      content:'';
      position:absolute; inset:0;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,0.75) 0%,
          rgba(0,0,0,0.55) 40%,
          rgba(0,0,0,0.70) 80%,
          rgba(0,0,0,0.90) 100%);
    }

    /* Layout */
    .layout {
      position:relative; z-index:10;
      height:100vh;
      display:grid;
      grid-template-rows: auto 1fr auto auto;
      padding:0;
      overflow:hidden;
    }

    /* ── TOP BAR ── */
    .top-bar {
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 40px 14px;
      border-bottom:1px solid rgba(201,162,39,0.25);
      background:rgba(0,0,0,0.35);
      backdrop-filter:blur(10px);
    }
    .logos {
      display:flex; align-items:center; gap:20px;
    }
    .logo-naturals {
      height:54px; width:auto;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8));
    }
    .logo-divider-v {
      width:1px; height:44px;
      background:linear-gradient(to bottom,transparent,var(--gold),transparent);
      opacity:0.5;
    }
    .logo-oakvalley {
      height:46px; width:auto;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8));
    }

    .title-center {
      text-align:center; flex:1;
    }
    .title-event {
      font-family:'Cinzel',serif;
      font-size:1.8rem;
      font-weight:900; letter-spacing:0.18em;
      text-transform:uppercase;
      color:var(--gold-light);
      text-shadow:0 2px 12px rgba(0,0,0,0.7);
    }
    .title-sub {
      font-family:'Cinzel',serif;
      font-size:0.85rem;
      letter-spacing:0.22em; text-transform:uppercase;
      color:#ffffff; opacity:0.85; margin-top:6px;
    }

    .live-badge {
      display:flex; align-items:center; gap:8px;
      font-family:'Cinzel',serif;
      font-size:0.85rem; letter-spacing:0.18em;
      text-transform:uppercase; color:var(--gold);
    }
    .live-dot {
      width:10px; height:10px; border-radius:50%;
      background:#4ade80;
      box-shadow:0 0 10px #4ade80;
      animation:pulse 2s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.85)} }

    /* ── MAIN LEADERBOARD ── */
    .leaderboard-wrap {
      overflow:hidden;
      padding:0 40px;
      display:flex; flex-direction:column;
    }

    /* Table header */
    .lb-header {
      display:grid;
      grid-template-columns: 80px 1fr 120px 120px 100px;
      gap:0;
      padding:16px 24px 12px;
      border-bottom:1px solid rgba(201,162,39,0.35);
      margin-top:16px;
    }
    .lb-header span {
      font-family:'Cinzel',serif;
      font-size:0.85rem;
      letter-spacing:0.14em; text-transform:uppercase;
      color:var(--gold-dim);
    }
    .lb-header span.right { text-align:right; }
    .lb-header span.center { text-align:center; }

    /* Rows */
    .lb-rows {
      flex:1; overflow:hidden;
      display:flex; flex-direction:column;
      gap:4px;
      padding:10px 0;
    }

    .lb-row {
      display:grid;
      grid-template-columns: 80px 1fr 120px 120px 100px;
      align-items:center;
      padding:14px 24px;
      border-radius:4px;
      border:1px solid transparent;
      transition:all 0.5s ease;
      animation:rowIn 0.6s ease both;
    }
    @keyframes rowIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }

    .lb-row.rank-1 {
      background:linear-gradient(135deg,rgba(201,162,39,0.18),rgba(201,162,39,0.06));
      border-color:rgba(201,162,39,0.40);
    }
    .lb-row.rank-2 {
      background:linear-gradient(135deg,rgba(180,180,180,0.10),rgba(180,180,180,0.03));
      border-color:rgba(180,180,180,0.20);
    }
    .lb-row.rank-3 {
      background:linear-gradient(135deg,rgba(180,120,40,0.10),rgba(180,120,40,0.03));
      border-color:rgba(180,120,40,0.20);
    }
    .lb-row.others {
      background:rgba(0,0,0,0.28);
      border-color:rgba(255,255,255,0.06);
    }

    .col-pos {
      font-family:'Cinzel',serif;
      font-size:1.5rem;
      font-weight:700; color:var(--gold);
    }
    .lb-row.rank-1 .col-pos { color:var(--gold-light); font-size:1.8rem; }

    .col-team {
      font-family:'Cinzel',serif;
      font-size:1.4rem;
      font-weight:600; color:var(--cream);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .lb-row.rank-1 .col-team { font-size:1.6rem; color:white; }

    .col-score {
      font-family:'Cinzel',serif;
      font-size:1.7rem;
      font-weight:900; text-align:right;
    }
    .col-score.under { color:#4ade80; }
    .col-score.over  { color:#f87171; }
    .col-score.even  { color:var(--cream); }
    .col-score.dashes { color:rgba(255,255,255,0.25); font-size:1.2rem; }

    .col-total {
      font-family:'Cormorant Garamond',serif;
      font-size:1.3rem;
      color:rgba(244,238,216,0.65); text-align:right;
    }

    .col-thru {
      font-family:'Cinzel',serif;
      font-size:1.0rem;
      letter-spacing:0.1em;
      color:rgba(244,238,216,0.55);
      text-align:center;
    }
    .col-thru.finished { color:#4ade80; }

    /* No teams yet */
    .lb-empty {
      flex:1; display:flex; align-items:center; justify-content:center;
      font-family:'Cinzel',serif;
      font-size:1.4rem; letter-spacing:0.18em;
      text-transform:uppercase;
      color:rgba(201,162,39,0.35);
    }

    /* ── CONTESTS STRIP ── */
    .contests-strip {
      display:grid; grid-template-columns:1fr 1fr;
      gap:14px;
      padding:14px 40px;
      border-top:1px solid rgba(201,162,39,0.18);
      background:rgba(0,0,0,0.30);
    }
    .contest-box {
      background:rgba(0,0,0,0.4);
      border:1px solid rgba(201,162,39,0.22);
      border-radius:3px;
      padding:12px 20px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .contest-label {
      font-family:'Cinzel',serif;
      font-size:0.85rem;
      letter-spacing:0.16em; text-transform:uppercase;
      color:var(--gold-dim);
    }
    .contest-value {
      font-family:'Cinzel',serif;
      font-size:1.2rem;
      color:var(--gold-light); font-weight:700;
      text-align:right;
    }
    .contest-value small {
      display:block;
      font-size:0.75rem;
      font-weight:400; color:var(--gold-dim);
      letter-spacing:0.10em;
    }

    /* ── SPONSOR TICKER ── */
    .sponsor-ticker {
      background:rgba(0,0,0,0.55);
      border-top:1px solid rgba(201,162,39,0.25);
      padding:12px 0;
      overflow:hidden;
      position:relative;
    }
    .sponsor-ticker::before, .sponsor-ticker::after {
      content:'';
      position:absolute; top:0; bottom:0; width:60px;
      z-index:2; pointer-events:none;
    }
    .sponsor-ticker::before { left:0;  background:linear-gradient(to right, rgba(0,0,0,0.6), transparent); }
    .sponsor-ticker::after  { right:0; background:linear-gradient(to left,  rgba(0,0,0,0.6), transparent); }

    .ticker-track {
      display:flex; align-items:center; gap:60px;
      white-space:nowrap;
      animation:tickerScroll 30s linear infinite;
    }
    @keyframes tickerScroll {
      from { transform:translateX(0); }
      to   { transform:translateX(-50%); }
    }
    .ticker-label {
      font-family:'Cinzel',serif;
      font-size:0.85rem;
      letter-spacing:0.14em; text-transform:uppercase;
      color:var(--gold-dim); flex-shrink:0;
    }
    .ticker-sponsor {
      font-family:'Cinzel',serif;
      font-size:1.0rem;
      letter-spacing:0.12em; text-transform:uppercase;
      color:var(--cream); flex-shrink:0;
    }
    .ticker-diamond {
      width:6px; height:6px;
      background:var(--gold); transform:rotate(45deg);
      flex-shrink:0;
    }

    /* Clock */
    .clock {
      font-family:'Cinzel',serif;
      font-size:1.0rem;
      color:var(--gold-dim); letter-spacing:0.12em;
    }

    /* Home link */
    .home-link {
      font-family:'Cinzel',serif;
      font-size:0.85rem; letter-spacing:0.14em;
      text-transform:uppercase;
      color:#ffffff;
      text-decoration:none;
      transition:color 0.2s;
      display:block; margin-top:4px;
    }
    .home-link:hover { color:var(--gold-light); }

    /* Refresh countdown */
    .refresh-indicator {
      position:fixed; bottom:16px; right:24px;
      font-family:'Cinzel',serif;
      font-size:0.75rem; letter-spacing:0.12em;
      text-transform:uppercase;
      color:rgba(201,162,39,0.35);
      z-index:20;
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="layout">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="logos">
        <img class="logo-naturals"
             src="https://images.squarespace-cdn.com/content/v1/65b2759817ce66234d372a27/f8b60d78-fc73-4e77-85c6-7595dfb53e17/Nats-Logo.png"
             alt="STL Naturals">
        <div class="logo-divider-v"></div>
        <img class="logo-oakvalley" src="assets/images/oakvalley_logo.png" alt="Oak Valley">
      </div>

      <div class="title-center">
        <div class="title-event">STL Naturals Golf Classic</div>
        <div class="title-sub">Oak Valley Golf Course &amp; Resort &nbsp;·&nbsp; Live Leaderboard</div>
      </div>

      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
        <div class="live-badge"><div class="live-dot"></div>Live</div>
        <div class="clock" id="clock">—</div>
        <a href="index.html" class="home-link">← Tournament Home</a>
      </div>
    </div>

    <!-- LEADERBOARD -->
    <div class="leaderboard-wrap">
      <div class="lb-header">
        <span>Pos</span>
        <span>Team</span>
        <span class="right">Score</span>
        <span class="right">Total</span>
        <span class="center">Thru</span>
      </div>
      <div class="lb-rows" id="lb-rows">
        <div class="lb-empty">Leaderboard will appear once scoring begins</div>
      </div>
    </div>

    <!-- CONTESTS -->
    <div class="contests-strip">
      <div class="contest-box">
        <div class="contest-label">⛳ Longest Drive</div>
        <div class="contest-value" id="ld-value">
          <small>Awaiting Results</small>
        </div>
      </div>
      <div class="contest-box">
        <div class="contest-label">🎯 Closest to the Pin</div>
        <div class="contest-value" id="ctp-value">
          <small>Awaiting Results</small>
        </div>
      </div>
    </div>

    <!-- SPONSOR TICKER -->
    <div class="sponsor-ticker">
      <div class="ticker-track" id="ticker-track">
        <!-- Populated by JS -->
      </div>
    </div>

  </div>

  <div class="refresh-indicator" id="refresh-indicator">Refreshing in <span id="countdown">30</span>s</div>

  <script src="assets/js/storage.js"></script>
  <script>
    let refreshTimer = 30;

    async function loadLeaderboard() {
      const board    = await DB.getLeaderboard();
      const contests = await DB.getContests();
      const course   = await DB.getCourse();
      const par      = course.pars.reduce((a,b)=>a+b,0);

      renderBoard(board, par);
      renderContests(contests);
      await renderTicker();
    }

    function renderBoard(board, totalPar) {
      const el = document.getElementById('lb-rows');

      if (board.length === 0) {
        el.innerHTML = '<div class="lb-empty">Leaderboard will appear once scoring begins</div>';
        return;
      }

      // Assign tied positions
      let pos = 1;
      const rows = board.map((team, idx) => {
        if (idx > 0 && team.scoreToPar !== board[idx-1].scoreToPar) pos = idx + 1;
        const displayPos = pos;

        const rankClass = pos===1?'rank-1':pos===2?'rank-2':pos===3?'rank-3':'others';
        const posLabel  = pos===1?'🏆':pos===2?'2':pos===3?'3':`${displayPos}`;

        let scoreDisplay, scoreCls;
        if (team.scoreToPar === null) {
          scoreDisplay = '—'; scoreCls = 'dashes';
        } else if (team.scoreToPar === 0) {
          scoreDisplay = 'E'; scoreCls = 'even';
        } else if (team.scoreToPar < 0) {
          scoreDisplay = team.scoreToPar; scoreCls = 'under';
        } else {
          scoreDisplay = `+${team.scoreToPar}`; scoreCls = 'over';
        }

        const thruCls   = team.holesPlayed===18?'finished':'';
        const totalDisp = team.holesPlayed > 0 ? team.grossTotal : '—';

        return `
          <div class="lb-row ${rankClass}" style="animation-delay:${idx*0.06}s">
            <div class="col-pos">${posLabel}</div>
            <div class="col-team">${esc(team.teamName)}</div>
            <div class="col-score ${scoreCls}">${scoreDisplay}</div>
            <div class="col-total">${totalDisp}</div>
            <div class="col-thru ${thruCls}">${team.thru}</div>
          </div>
        `;
      });

      el.innerHTML = rows.join('');
    }

    function renderContests(contests) {
      const ld  = contests['longest_drive'];
      const ctp = contests['closest_to_pin'];

      const ldEl  = document.getElementById('ld-value');
      const ctpEl = document.getElementById('ctp-value');

      if (ld && ld.player) {
        ldEl.innerHTML = `${esc(ld.player)}<small>Hole ${esc(String(ld.hole||''))} ${ld.distance?'· '+esc(ld.distance):''}</small>`;
      } else {
        ldEl.innerHTML = '<small>Awaiting Results</small>';
      }

      if (ctp && ctp.player) {
        ctpEl.innerHTML = `${esc(ctp.player)}<small>Hole ${esc(String(ctp.hole||''))} ${ctp.distance?'· '+esc(ctp.distance):''}</small>`;
      } else {
        ctpEl.innerHTML = '<small>Awaiting Results</small>';
      }
    }

    async function renderTicker() {
      const sponsors = await DB.getSponsors();
      const track    = document.getElementById('ticker-track');

      // Build sponsor list — use registered sponsors or fallback placeholder
      const items = sponsors.length > 0
        ? sponsors.map(s => s.bizName || s.contactName)
        : ['Presenting Sponsor', 'Gold Sponsor', 'Silver Sponsor', 'Community Partner'];

      const divider = `<div class="ticker-diamond"></div>`;
      const label   = `<span class="ticker-label">Our Sponsors</span>${divider}`;

      const sponsorHtml = items.map(name =>
        `<span class="ticker-sponsor">${esc(name)}</span>${divider}`
      ).join('');

      // Double it so scroll loops seamlessly
      track.innerHTML = label + sponsorHtml + label + sponsorHtml;
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true });
    }

    function countdown() {
      refreshTimer--;
      document.getElementById('countdown').textContent = refreshTimer;
      if (refreshTimer <= 0) {
        refreshTimer = 30;
        loadLeaderboard();
      }
    }

    function esc(str) {
      return String(str||'')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Init
    loadLeaderboard();
    updateClock();
    setInterval(updateClock, 1000);
    setInterval(countdown, 1000);
  </script>
</body>
</html>
