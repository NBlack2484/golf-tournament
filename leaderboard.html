<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: url('assets/images/cypress_point.jpg') no-repeat center center fixed;
    background-size: cover;
    font-family: Arial, sans-serif;
  }

  .overlay {
    width: 100%;
    min-height: 100vh;
    background-color: rgba(0,0,0,0.35);
    padding: 2rem;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    color: white;
    text-align: center;
    margin-bottom: 1rem;
  }

  table {
    width: 80%;
    max-width: 800px;
    border-collapse: collapse;
    background-color: rgba(255,255,255,0.9);
    color: black;
  }

  th, td {
    padding: 0.5rem 1rem;
    border: 1px solid #ddd;
    text-align: center;
  }

  th {
    background-color: #e63946;
    color: white;
  }

  .btn {
    display: block;
    margin-top: 2rem;
    padding: 12px 24px;
    background-color: #e63946;
    color: white;
    text-decoration: none;
    border-radius: 5px;
  }

  .btn:hover {
    background-color: #d62828;
  }
</style>
</head>
<body>
  <div class="overlay">
    <h1>Live Leaderboard</h1>
    <table>
      <tr>
        <th>Player</th>
        <th>Hole Score</th>
        <th>Total Score</th>
      </tr>
      <tr>
        <td>Player 1</td>
        <td>4</td>
        <td>28</td>
      </tr>
      <tr>
        <td>Player 2</td>
        <td>5</td>
        <td>30</td>
      </tr>
    </table>
    <a href="tv.html" class="btn">Full Screen Leaderboard</a>
  </div>
</body>
</html>
