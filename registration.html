<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STL Naturals Tournament Registration</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      background: url('assets/images/augusta.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .registration-card {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .registration-card h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .registration-card label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    .registration-card input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .submit-button {
      margin-top: 25px;
      width: 100%;
      padding: 15px;
      font-size: 1.2rem;
      font-weight: bold;
      color: #fff;
      background-color: rgba(0,123,255,0.85);
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .submit-button:hover {
      background-color: rgba(0,123,255,1);
    }
  </style>
</head>
<body>

  <div class="registration-card">
    <h1>STL Naturals Tournament Registration</h1>
    <form id="registrationForm">
      <label for="playerName">Player Name *</label>
      <input type="text" id="playerName" name="playerName" required>

      <label for="email">Email *</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone</label>
      <input type="text" id="phone" name="phone">

      <label for="teamName">Team Name *</label>
      <input list="teamNames" id="teamName" name="teamName" required>
      <datalist id="teamNames"></datalist>

      <button type="submit" class="submit-button">Register & Get Venmo Payment</button>
    </form>
  </div>

  <script>
    const teamDatalist = document.getElementById('teamNames');
    let existingTeams = JSON.parse(localStorage.getItem('teams')) || [];

    function populateTeams() {
      teamDatalist.innerHTML = '';
      existingTeams.forEach(team => {
        const option = document.createElement('option');
        option.value = team;
        teamDatalist.appendChild(option);
      });
    }

    populateTeams();

    document.getElementById('registrationForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const playerName = document.getElementById('playerName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const teamName = document.getElementById('teamName').value.trim();

      if (!playerName || !email || !teamName) {
        alert('Please fill in all required fields.');
        return;
      }

      const paymentCode = 'STL-2026-' + Math.floor(1000 + Math.random() * 9000);

      const registrations = JSON.parse(localStorage.getItem('registrations')) || [];
      registrations.push({ playerName, email, phone, teamName, paymentCode, paid: false });
      localStorage.setItem('registrations', JSON.stringify(registrations));

      if (!existingTeams.includes(teamName)) {
        existingTeams.push(teamName);
        localStorage.setItem('teams', JSON.stringify(existingTeams));
        populateTeams();
      }

      const params = new URLSearchParams({ playerName, teamName, paymentCode });
      window.location.href = 'confirmation.html?' + params.toString();
    });
  </script>

</body>
</html>
