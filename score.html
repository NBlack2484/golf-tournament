<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Score Entry · STL Naturals Golf Classic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:       #c9a227;
      --gold-light: #f0d060;
      --gold-dim:   rgba(201,162,39,0.55);
      --cream:      #f4eed8;
      --card-bg:    rgba(4,10,4,0.82);
      --card-border:rgba(201,162,39,0.28);
      --eagle:  #a855f7;
      --birdie: #3b82f6;
      --par:    #4ade80;
      --bogey:  #facc15;
      --double: #f97316;
      --worse:  #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: url('assets/images/augusta.jpg') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      color: var(--cream);
    }
    body::before {
      content:''; position:fixed; inset:0;
      background: rgba(0,0,0,0.72);
      pointer-events:none; z-index:0;
    }

    /* ── HEADER ── */
    .header {
      position:relative; z-index:10;
      background: rgba(0,0,0,0.6);
      border-bottom: 1px solid var(--card-border);
      padding: 14px 20px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .header-team {
      font-family:'Cinzel',serif;
      font-size:0.85rem; font-weight:700;
      color:var(--gold-light);
    }
    .header-score {
      font-family:'Cinzel',serif;
      font-size:0.85rem;
      color:var(--cream);
    }
    .header-score span { color:var(--gold); }

    /* ── ACCESS SCREEN ── */
    #access-screen {
      position:relative; z-index:10;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:calc(100vh - 60px);
      padding:24px;
    }
    .access-card {
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:6px;
      backdrop-filter:blur(20px);
      padding:36px 28px;
      width:min(400px,100%);
      text-align:center;
    }
    .access-card h1 {
      font-family:'Cinzel',serif;
      font-size:1.3rem; color:var(--gold-light);
      margin-bottom:8px;
    }
    .access-card p { font-style:italic; color:rgba(244,238,216,0.6); margin-bottom:28px; font-size:1rem; }

    .token-input {
      width:100%;
      background:rgba(0,0,0,0.5);
      border:1px solid rgba(201,162,39,0.4);
      border-radius:4px;
      color:var(--cream);
      font-family:'Cinzel',serif;
      font-size:1.6rem;
      letter-spacing:0.3em;
      text-align:center;
      text-transform:uppercase;
      padding:14px;
      outline:none;
      margin-bottom:16px;
    }
    .token-input:focus { border-color:var(--gold); }

    .btn-gold {
      width:100%;
      font-family:'Cinzel',serif;
      font-size:0.68rem; letter-spacing:0.20em;
      text-transform:uppercase;
      padding:14px;
      background:linear-gradient(135deg,#c9a227,#f0d060,#c9a227);
      color:#0a0800; border:none; border-radius:3px;
      cursor:pointer; transition:all 0.2s;
      font-weight:700;
    }
    .btn-gold:hover { filter:brightness(1.1); }

    /* ── SCORECARD SCREEN ── */
    #score-screen { display:none; position:relative; z-index:10; padding:0 0 100px; }
    #score-screen.show { display:block; }

    /* Hole progress bar */
    .progress-bar {
      background:rgba(0,0,0,0.5);
      border-bottom:1px solid var(--card-border);
      padding:10px 16px;
      display:flex; gap:4px;
    }
    .progress-hole {
      flex:1; height:6px; border-radius:3px;
      background:rgba(255,255,255,0.1);
      transition:background 0.3s;
    }
    .progress-hole.done  { background:var(--gold); }
    .progress-hole.active { background:rgba(201,162,39,0.5); }

    /* Hole card */
    .hole-card {
      margin:16px;
      background:var(--card-bg);
      border:1px solid var(--card-border);
      border-radius:8px;
      backdrop-filter:blur(20px);
      overflow:hidden;
    }

    .hole-header {
      background:linear-gradient(135deg, rgba(201,162,39,0.18) 0%, rgba(201,162,39,0.06) 100%);
      border-bottom:1px solid var(--card-border);
      padding:16px 20px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .hole-number {
      font-family:'Cinzel',serif;
      font-size:1.5rem; font-weight:900;
      color:var(--gold-light);
    }
    .hole-number small {
      display:block;
      font-size:0.55rem; letter-spacing:0.18em;
      text-transform:uppercase; color:var(--gold-dim);
      font-weight:400;
    }
    .hole-par {
      font-family:'Cinzel',serif;
      font-size:1.0rem; color:var(--cream);
      text-align:right;
    }
    .hole-par small { display:block; font-size:0.55rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold-dim); }

    /* Score selector */
    .score-selector {
      padding:20px 16px;
    }
    .score-label {
      font-family:'Cinzel',serif;
      font-size:0.60rem; letter-spacing:0.18em;
      text-transform:uppercase; color:var(--gold-dim);
      text-align:center; margin-bottom:14px;
    }

    /* Big +/- counter */
    .stroke-counter {
      display:flex; align-items:center; justify-content:center;
      gap:0; margin-bottom:16px;
    }
    .stroke-btn {
      width:64px; height:64px;
      background:rgba(201,162,39,0.12);
      border:1px solid rgba(201,162,39,0.35);
      border-radius:50%;
      color:var(--gold-light);
      font-size:2rem; font-weight:300;
      cursor:pointer; transition:all 0.15s;
      display:flex; align-items:center; justify-content:center;
      user-select:none; -webkit-tap-highlight-color:transparent;
    }
    .stroke-btn:active { background:rgba(201,162,39,0.28); transform:scale(0.93); }
    .stroke-display {
      width:100px; text-align:center;
      font-family:'Cinzel',serif;
      font-size:3.5rem; font-weight:900;
      color:var(--cream);
      line-height:1;
    }
    .stroke-label {
      font-family:'Cinzel',serif;
      font-size:0.65rem; letter-spacing:0.15em;
      text-transform:uppercase;
      text-align:center;
      padding:6px 16px;
      border-radius:20px;
      margin:0 auto 20px;
      display:inline-block;
      min-width:100px;
    }
    .stroke-label-wrap { text-align:center; }

    /* Quick-tap score buttons */
    .quick-scores {
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:8px;
      margin-bottom:20px;
    }
    .quick-btn {
      padding:10px 4px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:4px;
      color:rgba(244,238,216,0.6);
      font-family:'Cinzel',serif;
      font-size:0.75rem;
      cursor:pointer; transition:all 0.15s;
      text-align:center;
      -webkit-tap-highlight-color:transparent;
    }
    .quick-btn:active { transform:scale(0.93); }
    .quick-btn.q-eagle  { border-color:var(--eagle);  color:var(--eagle); }
    .quick-btn.q-birdie { border-color:var(--birdie); color:var(--birdie); }
    .quick-btn.q-par    { border-color:var(--par);    color:var(--par); }
    .quick-btn.q-bogey  { border-color:var(--bogey);  color:var(--bogey); }
    .quick-btn.q-double { border-color:var(--double); color:var(--double); }
    .quick-btn.q-triple { border-color:var(--worse);  color:var(--worse); }

    /* Save & nav buttons */
    .hole-actions {
      display:grid; grid-template-columns:1fr 1fr;
      gap:10px; padding:0 16px 16px;
    }
    .btn-prev, .btn-next {
      font-family:'Cinzel',serif;
      font-size:0.62rem; letter-spacing:0.14em;
      text-transform:uppercase;
      padding:13px; border-radius:3px;
      cursor:pointer; border:none; transition:all 0.2s;
    }
    .btn-prev {
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.15);
      color:rgba(244,238,216,0.7);
    }
    .btn-next {
      background:linear-gradient(135deg,#c9a227,#f0d060,#c9a227);
      color:#0a0800; font-weight:700;
    }

    /* Scorecard summary (all 18 holes mini view) */
    .scorecard-summary {
      margin:0 16px 16px;
      background:rgba(0,0,0,0.4);
      border:1px solid var(--card-border);
      border-radius:6px;
      overflow:hidden;
    }
    .scorecard-summary-title {
      font-family:'Cinzel',serif;
      font-size:0.60rem; letter-spacing:0.16em;
      text-transform:uppercase; color:var(--gold);
      padding:10px 14px;
      border-bottom:1px solid var(--card-border);
    }
    .sc-grid {
      display:grid; grid-template-columns:repeat(9,1fr);
      font-size:0.78rem;
    }
    .sc-cell {
      padding:7px 4px;
      text-align:center;
      border-right:1px solid rgba(255,255,255,0.05);
      border-bottom:1px solid rgba(255,255,255,0.05);
      cursor:pointer;
    }
    .sc-cell:nth-child(9n) { border-right:none; }
    .sc-cell .sc-h { font-family:'Cinzel',serif; font-size:0.55rem; color:var(--gold-dim); }
    .sc-cell .sc-s { font-size:0.9rem; color:var(--cream); }
    .sc-cell .sc-s.eagle  { color:var(--eagle); font-weight:700; }
    .sc-cell .sc-s.birdie { color:var(--birdie); font-weight:700; }
    .sc-cell .sc-s.bogey  { color:var(--bogey); }
    .sc-cell .sc-s.double { color:var(--double); }
    .sc-cell .sc-s.worse  { color:var(--worse); }
    .sc-cell .sc-s.empty  { color:rgba(255,255,255,0.15); }
    .sc-cell.active-hole  { background:rgba(201,162,39,0.12); }

    /* Totals row */
    .sc-totals {
      display:flex; justify-content:space-between;
      padding:10px 14px;
      font-family:'Cinzel',serif; font-size:0.75rem;
      border-top:1px solid var(--card-border);
    }
    .sc-totals span { color:var(--gold-dim); }
    .sc-totals strong { color:var(--gold-light); }

    /* Finish screen */
    #finish-screen { display:none; position:relative; z-index:10; padding:40px 20px; text-align:center; }
    #finish-screen.show { display:block; }
    #finish-screen h2 { font-family:'Cinzel',serif; font-size:1.5rem; color:var(--gold-light); margin-bottom:12px; }
    #finish-screen p  { font-style:italic; color:rgba(244,238,216,0.65); margin-bottom:28px; font-size:1.05rem; line-height:1.6; }

    .alert { padding:12px 16px; border-radius:3px; margin:0 16px 12px; font-size:0.95rem; display:none; }
    .alert.show { display:block; }
    .alert-error { background:rgba(217,96,96,0.15); border:1px solid rgba(217,96,96,0.4); color:#e08888; }
    .alert-success { background:rgba(92,184,122,0.15); border:1px solid rgba(92,184,122,0.4); color:#7fd498; }
  </style>
</head>
<body>

  <!-- ACCESS SCREEN -->
  <div id="access-screen">
    <div class="access-card">
      <h1>Score Entry</h1>
      <p>Enter your team's scorer code to begin tracking your round.</p>
      <input class="token-input" type="text" id="token-input" maxlength="6" placeholder="ABC123"
             oninput="this.value=this.value.toUpperCase()"
             onkeydown="if(event.key==='Enter')loadScorer()">
      <button class="btn-gold" onclick="loadScorer()">Start Scoring</button>
      <div id="access-alert" class="alert alert-error" style="margin:12px 0 0;"></div>
    </div>
  </div>

  <!-- SCORE SCREEN -->
  <div id="score-screen">

    <div class="header">
      <div class="header-team" id="hdr-team">—</div>
      <div class="header-score">Thru <span id="hdr-thru">0</span> &nbsp;|&nbsp; <span id="hdr-total">E</span></div>
    </div>

    <div class="progress-bar" id="progress-bar"></div>

    <div id="alert-main" class="alert alert-error"></div>

    <!-- Hole Card -->
    <div class="hole-card">
      <div class="hole-header">
        <div class="hole-number">
          <small>Hole</small>
          <span id="hole-num-display">1</span>
        </div>
        <div class="hole-par">
          <small>Par</small>
          <span id="hole-par-display">4</span>
        </div>
      </div>

      <div class="score-selector">
        <div class="score-label">Scramble Team Score</div>

        <div class="stroke-counter">
          <button class="stroke-btn" onclick="adjustStroke(-1)">−</button>
          <div class="stroke-display" id="stroke-display">—</div>
          <button class="stroke-btn" onclick="adjustStroke(1)">+</button>
        </div>

        <div class="stroke-label-wrap">
          <span class="stroke-label" id="stroke-label" style="background:rgba(255,255,255,0.05);color:rgba(244,238,216,0.4);">
            Enter Score
          </span>
        </div>

        <!-- Quick tap -->
        <div class="quick-scores" id="quick-scores"></div>
      </div>

      <div class="hole-actions">
        <button class="btn-prev" onclick="prevHole()">← Previous</button>
        <button class="btn-next" id="btn-next" onclick="nextHole()">Next Hole →</button>
      </div>
    </div>

    <!-- Mini scorecard -->
    <div class="scorecard-summary">
      <div class="scorecard-summary-title">Scorecard</div>
      <div class="sc-grid" id="sc-grid"></div>
      <div class="sc-totals">
        <div><span>Out:</span> <strong id="sc-out">—</strong></div>
        <div><span>In:</span>  <strong id="sc-in">—</strong></div>
        <div><span>Total:</span> <strong id="sc-total">—</strong></div>
        <div><span>To Par:</span> <strong id="sc-topar">—</strong></div>
      </div>
    </div>

  </div>

  <!-- FINISH SCREEN -->
  <div id="finish-screen">
    <div style="font-size:3rem;margin-bottom:16px;">🏆</div>
    <h2>Round Complete!</h2>
    <p id="finish-msg">Great round! Your scores have been submitted to the leaderboard.</p>
    <button class="btn-gold" style="max-width:320px;margin:0 auto;display:block;" onclick="reviewCard()">Review Scorecard</button>
  </div>

  <script src="assets/js/storage.js"></script>
  <script>
    let currentToken  = null;
    let currentTeam   = null;
    let teamScores    = Array(18).fill(null);
    let coursePars    = Array(18).fill(4);
    let currentHole   = 0; // 0-indexed
    let startHole     = 0; // 0-indexed

    // Check URL for token param ?t=XXXXXX
    const urlToken = new URLSearchParams(window.location.search).get('t');
    if (urlToken) {
      document.getElementById('token-input').value = urlToken.toUpperCase();
      loadScorer();
    }

    async function loadScorer() {
      const token = document.getElementById('token-input').value.trim().toUpperCase();
      if (token.length < 4) return showAccessAlert('Please enter your scorer code.');
      const entry = await DB.getTeamByToken(token);
      if (!entry) return showAccessAlert('Invalid scorer code. Check with your tournament director.');

      currentToken = token;
      currentTeam  = entry.teamName;
      teamScores   = [...entry.scores];
      startHole    = (entry.startHole || 1) - 1;

      const course = await DB.getCourse();
      coursePars   = course.pars;

      // Go to first unentered hole from start
      currentHole = startHole;
      for (let i = 0; i < 18; i++) {
        const h = (startHole + i) % 18;
        if (teamScores[h] === null) { currentHole = h; break; }
      }

      document.getElementById('access-screen').style.display = 'none';
      document.getElementById('score-screen').classList.add('show');
      document.getElementById('hdr-team').textContent = currentTeam;

      renderHole();
      renderMiniCard();
      updateHeader();
    }

    function renderHole() {
      const h   = currentHole;
      const par = coursePars[h];
      const score = teamScores[h];

      document.getElementById('hole-num-display').textContent = h + 1;
      document.getElementById('hole-par-display').textContent = par;
      document.getElementById('stroke-display').textContent   = score !== null ? score : '—';
      document.getElementById('btn-next').textContent = currentHole === (startHole + 17) % 18 ? 'Finish Round ✓' : 'Next Hole →';

      updateStrokeLabel(score, par);
      renderQuickButtons(par);
      renderProgress();
      renderMiniCard();
    }

    function renderQuickButtons(par) {
      const qb = document.getElementById('quick-scores');
      const labels = [
        { label:'Eagle', cls:'q-eagle',  val: par-2 },
        { label:'Birdie',cls:'q-birdie', val: par-1 },
        { label:'Par',   cls:'q-par',    val: par   },
        { label:'Bogey', cls:'q-bogey',  val: par+1 },
        { label:'+2',    cls:'q-double', val: par+2 },
        { label:'+3',    cls:'q-triple', val: par+3 },
      ].filter(b => b.val > 0);
      qb.innerHTML = labels.map(b =>
        `<button class="quick-btn ${b.cls}" onclick="setScore(${b.val})">${b.label}<br><small style="opacity:.7">${b.val}</small></button>`
      ).join('');
    }

    function adjustStroke(delta) {
      const cur = teamScores[currentHole];
      const par = coursePars[currentHole];
      const newVal = Math.max(1, (cur !== null ? cur : par) + delta);
      setScore(newVal);
    }

    function setScore(val) {
      teamScores[currentHole] = val;
      document.getElementById('stroke-display').textContent = val;
      updateStrokeLabel(val, coursePars[currentHole]);
      saveHole(currentHole, val);
      renderMiniCard();
      updateHeader();
      renderProgress();
    }

    function updateStrokeLabel(score, par) {
      const el = document.getElementById('stroke-label');
      if (score === null) { el.style.background='rgba(255,255,255,0.05)'; el.style.color='rgba(244,238,216,0.4)'; el.textContent='Enter Score'; return; }
      const diff = score - par;
      const configs = {
        '-3': { bg:'rgba(168,85,247,0.2)', color:'#a855f7', label:'Albatross ⬦' },
        '-2': { bg:'rgba(59,130,246,0.2)',  color:'#60a5fa', label:'Eagle ◎' },
        '-1': { bg:'rgba(59,130,246,0.15)', color:'#93c5fd', label:'Birdie ○' },
         '0': { bg:'rgba(74,222,128,0.15)', color:'#4ade80', label:'Par' },
         '1': { bg:'rgba(250,204,21,0.15)', color:'#facc15', label:'Bogey' },
         '2': { bg:'rgba(249,115,22,0.15)', color:'#fb923c', label:'Double Bogey' },
      };
      const cfg = configs[diff] || { bg:'rgba(239,68,68,0.15)', color:'#f87171', label:`+${diff} (${diff} over)` };
      el.style.background = cfg.bg;
      el.style.color      = cfg.color;
      el.textContent      = cfg.label;
    }

    function renderProgress() {
      const pb = document.getElementById('progress-bar');
      pb.innerHTML = '';
      for (let i = 0; i < 18; i++) {
        const d = document.createElement('div');
        d.className = 'progress-hole' + (teamScores[i]!==null?' done':(i===currentHole?' active':''));
        pb.appendChild(d);
      }
    }

    function renderMiniCard() {
      const grid = document.getElementById('sc-grid');
      grid.innerHTML = '';
      let out=0, outCount=0, inn=0, inCount=0, total=0, parTotal=0;

      for (let i = 0; i < 18; i++) {
        const s = teamScores[i], p = coursePars[i];
        const cell = document.createElement('div');
        cell.className = 'sc-cell' + (i===currentHole?' active-hole':'');
        cell.onclick = () => { currentHole=i; renderHole(); };

        let cls='empty', txt='·';
        if (s !== null) {
          const d = s - p;
          cls = d<=-2?'eagle':d===-1?'birdie':d===0?'':d===1?'bogey':d===2?'double':'worse';
          txt = s;
          total += s; parTotal += p;
          if (i<9) { out+=s; outCount++; } else { inn+=s; inCount++; }
        }
        cell.innerHTML = `<div class="sc-h">${i+1}</div><div class="sc-s ${cls}">${txt}</div>`;
        grid.appendChild(cell);
      }

      const played = teamScores.filter(s=>s!==null).length;
      const tp = played > 0 ? total - parTotal : null;
      document.getElementById('sc-out').textContent   = outCount > 0 ? out : '—';
      document.getElementById('sc-in').textContent    = inCount  > 0 ? inn  : '—';
      document.getElementById('sc-total').textContent = played   > 0 ? total : '—';
      document.getElementById('sc-topar').textContent = tp !== null ? (tp===0?'E':tp>0?`+${tp}`:tp) : '—';
    }

    function updateHeader() {
      const played = teamScores.filter(s=>s!==null).length;
      const total  = teamScores.filter(s=>s!==null).reduce((a,b)=>a+b,0);
      let parThrough = 0;
      for (let i=0;i<18;i++) { if (teamScores[i]!==null) parThrough+=coursePars[i]; }
      const tp = played > 0 ? total - parThrough : null;
      document.getElementById('hdr-thru').textContent = played===18?'F':played;
      document.getElementById('hdr-total').textContent = tp===null?'E':tp===0?'E':tp>0?`+${tp}`:tp;
    }

    async function saveHole(holeIndex, strokes) {
      await DB.saveHoleScore(currentToken, holeIndex, strokes);
    }

    function nextHole() {
      const isLast = currentHole === (startHole + 17) % 18;
      if (isLast) {
        const allDone = teamScores.every(s => s !== null);
        if (!allDone) {
          const missing = teamScores.map((s,i)=>s===null?i+1:null).filter(Boolean);
          return showMainAlert(`You still have scores missing for hole${missing.length>1?'s':''}: ${missing.join(', ')}`);
        }
        document.getElementById('score-screen').classList.remove('show');
        const msg = `${currentTeam} — Round complete! `;
        const total = teamScores.reduce((a,b)=>a+b,0);
        const par   = coursePars.reduce((a,b)=>a+b,0);
        const tp    = total - par;
        document.getElementById('finish-msg').textContent = `Final score: ${total} (${tp===0?'Even':tp>0?`+${tp}`:tp}). Your scores are live on the leaderboard.`;
        document.getElementById('finish-screen').classList.add('show');
        return;
      }
      currentHole = (currentHole + 1) % 18;
      renderHole();
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function prevHole() {
      currentHole = (currentHole - 1 + 18) % 18;
      renderHole();
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function reviewCard() {
      document.getElementById('finish-screen').classList.remove('show');
      document.getElementById('score-screen').classList.add('show');
      renderHole();
    }

    function showAccessAlert(msg) {
      const el = document.getElementById('access-alert');
      el.textContent = msg; el.classList.add('show');
    }
    function showMainAlert(msg) {
      const el = document.getElementById('alert-main');
      el.textContent = msg; el.classList.add('show');
      setTimeout(()=>el.classList.remove('show'), 4000);
    }
  </script>
</body>
</html>
