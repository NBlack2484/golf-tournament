<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Leaderboard</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: url('assets/images/pine_valley.jpg') no-repeat center center fixed;
    background-size: cover;
    font-family: Arial, sans-serif;
  }

  .overlay {
    width: 100%;
    min-height: 100vh;
    background-color: rgba(0,0,0,0.5);
    padding: 2rem;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  h1 {
    color: white;
    font-size: 3rem;
    margin-bottom: 2rem;
    text-align: center;
  }

  table {
    width: 90%;
    max-width: 1200px;
    border-collapse: collapse;
    background-color: rgba(255,255,255,0.9);
    color: black;
  }

  th, td {
    padding: 1rem 2rem;
    border: 1px solid #ddd;
    text-align: center;
    font-size: 1.5rem;
  }

  th {
    background-color: #e63946;
    color: white;
    font-size: 1.8rem;
  }
</style>
</head>
<body>
  <div class="overlay">
    <h1>TV Leaderboard</h1>
    <table>
      <tr>
        <th>Player</th>
        <th>Hole Score</th>
        <th>Total Score</th>
      </tr>
      <tr>
        <td>Player 1</td>
        <td>4</td>
        <td>28</td>
      </tr>
      <tr>
        <td>Player 2</td>
        <td>5</td>
        <td>30</td>
      </tr>
    </table>
  </div>
</body>
</html>
